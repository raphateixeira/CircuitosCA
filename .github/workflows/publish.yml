name: Publicar site Quarto

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    uses: raphateixeira/.github/.github/workflows/quarto-publish.yml@main
    with:
      needs_r: true
      r_packages: "knitr, rmarkdown, magick"
      needs_magick_system_deps: true
      needs_tinytex: true
      tinytex_packages: "pgf pgfplots xcolor circuitikz"
